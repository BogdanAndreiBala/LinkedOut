<div class="page-layout">
  <h1 class="page-title">Jobs</h1>

  <app-generic-table
    [totalItems]="totalCount"
    [isLoading]="isLoading"
    [pageIndex]="currentPage - 1"
    [pageSize]="currentLimit"
    (pageChange)="onPageChange($event)"
    (searchChange)="onSearchChange($event)"
  >
    <table mat-table [dataSource]="jobs">
      <ng-container matColumnDef="job">
        <th mat-header-cell *matHeaderCellDef>Job</th>
        <td mat-cell *matCellDef="let job">
          <div class="job-info-cell">
            <mat-icon class="building-icon">domain</mat-icon>
            <div class="job-titles">
              <span class="job-title-text">{{ job.title }}</span>
              <span class="company-text">{{ job.company.name }}</span>
            </div>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="location">
        <th mat-header-cell *matHeaderCellDef>Location</th>
        <td mat-cell *matCellDef="let job">{{ job.location }}</td>
      </ng-container>

      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef>Type</th>
        <td mat-cell *matCellDef="let job">
          <span class="type-pill">{{ job.type }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="posted">
        <th mat-header-cell *matHeaderCellDef>Posted</th>
        <td mat-cell *matCellDef="let job">{{ job.createdAt | date: 'mediumDate' }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnsToDisplay; sticky: true"></tr>
      <tr mat-row *matRowDef="let row; columns: columnsToDisplay" class="mat-mdc-row"></tr>
    </table>
  </app-generic-table>
</div>
