<div class="network-page">
  <h1 class="page-title">Network</h1>

  <div class="search-cointainer">
    <mat-form-field appearance="outline" class="search-bar">
      <mat-icon matPrefix>search</mat-icon>
      <input matInput [formControl]="searchBar" placeholder="Search" />
    </mat-form-field>

    <div class="spinner-wrapper" *ngIf="loading$ | async">
      <mat-progress-spinner mode="indeterminate" diameter="25"></mat-progress-spinner>
    </div>
  </div>

  <div class="table-container mat-elevation-z1">
    <table mat-table [dataSource]="(users$ | async) || []">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let user">
          <div class="name-cell">
            <app-avatar [firstName]="user.firstName" [lastName]="user.lastName"></app-avatar>
            <span>{{ user.firstName }} {{ user.lastName }}</span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="headline">
        <th mat-header-cell *matHeaderCellDef>Headline</th>
        <td class="headline-cell" mat-cell *matCellDef="let user">
          <mat-icon [appTechIcons]="user.headline"> </mat-icon>
          {{ user.headline }}
        </td>
      </ng-container>

      <ng-container matColumnDef="location">
        <th mat-header-cell *matHeaderCellDef>Location</th>
        <td mat-cell *matCellDef="let user">{{ user.location }}</td>
      </ng-container>

      <ng-container matColumnDef="connections">
        <th mat-header-cell *matHeaderCellDef>Connections</th>
        <td mat-cell *matCellDef="let user">{{ user.connections }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnsToDisplay; sticky: true"></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: columnsToDisplay"
        (click)="onRowClick(row)"
        [appHighlightTableRow]="row.headline"
      ></tr>
    </table>
  </div>

  <div class="paginator-wrapper mat-elevation-z1">
    <ng-container *ngIf="preferences$ | async as prefs">
      <mat-paginator
        [length]="totalMatchCount$ | async"
        [pageSize]="prefs.pagination.pageSize"
        [pageIndex]="prefs.pagination.pageNumber - 1"
        [pageSizeOptions]="pageSizeOptions"
        (page)="onPageChange($event)"
        showFirstLastButtons
      >
      </mat-paginator>
    </ng-container>
  </div>
</div>
