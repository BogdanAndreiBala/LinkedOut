<div class="generic-table-layout">
  <div class="search-container">
    <mat-form-field appearance="outline" class="search-bar">
      <mat-icon matPrefix>search</mat-icon>
      <input matInput [formControl]="searchControl" placeholder="Search..." />
    </mat-form-field>

    <div class="spinner-wrapper" *ngIf="isLoading">
      <mat-progress-spinner mode="indeterminate" diameter="25"></mat-progress-spinner>
    </div>
  </div>

  <div class="table-container mat-elevation-z1">
    <ng-content></ng-content>
  </div>

  <div class="paginator-wrapper mat-elevation-z1">
    <mat-paginator
      [length]="totalItems"
      [pageSize]="pageSize"
      [pageIndex]="pageIndex"
      [pageSizeOptions]="pageSizeOptions"
      (page)="onPageEvent($event)"
      showFirstLastButtons
    >
    </mat-paginator>
  </div>
</div>
